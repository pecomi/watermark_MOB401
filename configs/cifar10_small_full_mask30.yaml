experiment_type: thesis
dataset: cifar10
model_name: cifar_small
methods: [standard, stable_aware_reg, stable_mask_direct, random_mask_direct]
seeds: [42, 43, 44]
data_dir: data
output_dir: outputs/thesis_results
result_name: results_full_mask30
clean_checkpoint: outputs/thesis_results/checkpoints/cifar10_cifar_small_seed{seed}_clean.pt
pretrain_only: false
evaluate_failed_precompression: true
cpu: false
device: cuda:1

batch_size: 128
num_workers: 2
train_subset:

epochs_clean: 20
epochs_watermark: 10
lr: 0.001
learning_rate_watermark: 0.0001
baseline_epochs_watermark: 5
baseline_learning_rate_watermark: 0.001
baseline_lambda_wm: 1.0
baseline_lambda_reg: 0.1
baseline_poison_ratio: 0.01
baseline_watermark_steps_per_batch: 1

poison_ratio: 0.03
trigger_size: 3
target_label: 0
lambda_wm: 2.0
lambda_reg: 1.0
importance_batches: 100

stable_mask_percent: 0.3
mask_granularity: channel
selection_mode: fisher_top
quant_stable_bits: 4
quant_error_alpha: 0.5
wm_importance_alpha: 0.5

watermark_steps_per_batch: 1
watermark_train_mode: joint
direct_embedding_mode: wm_focused
lambda_clean: 1.0
mask_floor: 0.02
grad_clip: 0.5
use_activation_guidance: false
activation_layer: layer4
lambda_act: 0.1

pruning_ratios: [0.0, 0.5, 0.7, 0.9]
quant_bits: [8, 4, 3]
